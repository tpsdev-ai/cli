# nono sandbox profile for tps agent run
# Agent processes run with restricted syscall/filesystem access.
[profile]
name = "tps-agent-run"
description = "TPS agent runtime — restricted to local filesystem and localhost networking"

[filesystem]
# Read-only by default
readonly = true
# Agent workspace and TPS dirs are writable
writable = [
  "~/.tps/",
  "~/ops/",
]
# Deny sensitive paths
deny = [
  "/etc/passwd",
  "/etc/shadow",
  "~/.ssh/",
  "~/.tps/secrets/",
]

[network]
# Agents may only reach localhost — proxy holds outbound API keys
localhost_only = true
allow = [
  "127.0.0.1",
]

[process]
# No spawning arbitrary processes
exec_allowlist = [
  "git",
  "bun",
  "node",
]
