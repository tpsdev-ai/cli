[meta]
name = "tps-agent-run"
description = "TPS agent runtime — restricted to local filesystem and localhost networking only. Agents never hold API keys; all outbound LLM calls go through the localhost proxy."

[filesystem]
readonly = true
writable = [
  "{home}/.tps/",
  "{home}/ops/",
]
deny = [
  "/etc/shadow",
  "{home}/.ssh/",
  "{home}/.tps/secrets/",
]

[network]
localhost_only = true
allow = [
  "127.0.0.1",
]

[process]
exec_allowlist = [
  "git",
  "bun",
  "node",
]
