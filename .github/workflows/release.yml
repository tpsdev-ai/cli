name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  preflight:
    name: Release Preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify tag is on main
        run: |
          if ! git merge-base --is-ancestor ${{ github.sha }} origin/main; then
            echo "❌ Tag ${{ github.ref_name }} points to a commit not on main."
            echo "   Release tags must be on the main branch."
            echo "   Push the version bump via PR first, then tag."
            exit 1
          fi
      - name: Verify package versions match tag
        run: |
          TAG_VERSION="${{ github.ref_name }}"
          TAG_VERSION="${TAG_VERSION#v}"
          PKG_VERSION=$(node -p "require('./packages/cli/package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "❌ Tag version ($TAG_VERSION) != package.json version ($PKG_VERSION)"
            exit 1
          fi

  build-binaries:
    name: Build Binaries
    needs: preflight
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-darwin-arm64
            pkg: cli-darwin-arm64
            artifact: tps-darwin-arm64
          - target: bun-darwin-x64
            pkg: cli-darwin-x64
            artifact: tps-darwin-x64
          - target: bun-linux-arm64
            pkg: cli-linux-arm64
            artifact: tps-linux-arm64
          - target: bun-linux-x64
            pkg: cli-linux-x64
            artifact: tps-linux-x64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Build workspace packages
        run: bun run build
      - name: Build ${TARGET}
        env:
          TARGET: ${{ matrix.target }}
          PKG: ${{ matrix.pkg }}
          ART: ${{ matrix.artifact }}
        run: |
          bun build --compile ./packages/cli/bin/tps.ts \
            --target=${TARGET} \
            --outfile=packages/cli/dist/${ART}
          sha256sum packages/cli/dist/${ART} > packages/cli/dist/${ART}.sha256
      - name: Stage binary
        env:
          PKG: ${{ matrix.pkg }}
          ART: ${{ matrix.artifact }}
        run: |
          mkdir -p /tmp/release/${PKG}
          cp packages/cli/dist/${ART} /tmp/release/${PKG}/tps
          cp packages/cli/dist/${ART}.sha256 /tmp/release/${PKG}/${ART}.sha256
          chmod +x /tmp/release/${PKG}/tps
          cp packages/${PKG}/README.md /tmp/release/${PKG}/README.md
      - name: Upload staging artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.pkg }}
          path: /tmp/release/${{ matrix.pkg }}
          if-no-files-found: error

  publish-packages:
    name: Publish npm packages
    needs: build-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/release
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: https://registry.npmjs.org/
      - name: Restore binary payloads into workspace
        run: |
          cp -R /tmp/release/cli-darwin-arm64/. packages/cli-darwin-arm64/
          cp -R /tmp/release/cli-darwin-x64/. packages/cli-darwin-x64/
          cp -R /tmp/release/cli-linux-arm64/. packages/cli-linux-arm64/
          cp -R /tmp/release/cli-linux-x64/. packages/cli-linux-x64/
      - name: Publish platform packages
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          for pkg in cli-darwin-arm64 cli-darwin-x64 cli-linux-arm64 cli-linux-x64; do
            npm publish --access public --workspace "@tpsdev-ai/$pkg" || {
              if npm view "@tpsdev-ai/$pkg@$VERSION" version 2>/dev/null; then
                echo "⏭️ @tpsdev-ai/$pkg@$VERSION already published, skipping"
              else
                echo "❌ Failed to publish @tpsdev-ai/$pkg" && exit 1
              fi
            }
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish meta package
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          npm publish --access public --workspace @tpsdev-ai/cli || {
            if npm view "@tpsdev-ai/cli@$VERSION" version 2>/dev/null; then
              echo "⏭️ @tpsdev-ai/cli@$VERSION already published, skipping"
            else
              exit 1
            fi
          }
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  github-release:
    name: GitHub release checksums
    needs: [build-binaries, publish-packages]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: /tmp/release
      - name: Create release artifacts
        run: |
          cat /tmp/release/cli-darwin-arm64/tps-darwin-arm64.sha256
          cat /tmp/release/cli-darwin-x64/tps-darwin-x64.sha256
          cat /tmp/release/cli-linux-arm64/tps-linux-arm64.sha256
          cat /tmp/release/cli-linux-x64/tps-linux-x64.sha256
      - name: Publish checksums to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            /tmp/release/cli-darwin-arm64/tps-darwin-arm64
            /tmp/release/cli-darwin-arm64/tps-darwin-arm64.sha256
            /tmp/release/cli-darwin-x64/tps-darwin-x64
            /tmp/release/cli-darwin-x64/tps-darwin-x64.sha256
            /tmp/release/cli-linux-arm64/tps-linux-arm64
            /tmp/release/cli-linux-arm64/tps-linux-arm64.sha256
            /tmp/release/cli-linux-x64/tps-linux-x64
            /tmp/release/cli-linux-x64/tps-linux-x64.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
