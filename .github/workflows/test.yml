name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build (TypeScript strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run build

  lint:
    name: Lint (Biome)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run lint:ci

  test:
    name: Unit & Integration Tests
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: |
          chmod +x test/fakes/nono/bin/nono 2>/dev/null || true
          chmod +x packages/cli/test/fakes/nono/bin/nono 2>/dev/null || true
      - run: bun run test

  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Check for known vulnerabilities
        run: bunx audit-ci --high

  docker:
    name: Docker Integration
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run tests in Docker
        run: docker compose run --rm test

  # SAST (Static Application Security Testing) using Semgrep.
  # Semgrep scans the codebase for security vulnerabilities, hardcoded secrets, and bad practices
  # using pattern matching. It is fast and catches common mistakes.
  sast-semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    continue-on-error: true # S23-B: don't block the pipeline on legacy style violations initially
    steps:
      - uses: actions/checkout@v4
      - run: python3 -m pip install semgrep
      - run: semgrep scan --config=auto --error --exclude='**/test/**' --exclude='**/dist/**'

  # SAST using CodeQL.
  # CodeQL performs deep semantic code analysis and taint tracking (e.g. tracking unvalidated user
  # input from an API endpoint all the way to a filesystem call). It catches complex logic flaws
  # that pattern-matching tools like Semgrep might miss.
  sast-codeql:
    name: CodeQL SAST
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
